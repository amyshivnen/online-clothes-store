<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Product</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="form-card" style="max-width: 800px; margin: 40px auto;">
        <h1 style="color: var(--primary-dark); margin-bottom: 20px;">Add New Product</h1>

        <form th:action="@{/products/save}" th:object="${product}" method="post">
            <div class="grid grid-2">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" th:field="*{title}">
                    <span class="error-text" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>

                <div class="form-group">
                    <label>Manufacturer</label>
                    <input type="text" th:field="*{manufacturer}">
                    <span class="error-text" th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}"></span>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" th:field="*{category}">
                    <span class="error-text" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
                </div>

                <div class="form-group">
                    <label>Price</label>
                    <input type="number" step="0.01" th:field="*{price}">
                    <span class="error-text" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                </div>

                <div class="form-group">
                    <label>Stock Quantity</label>
                    <input type="number" th:field="*{stockQuantity}">
                    <span class="error-text" th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></span>
                </div>

                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" th:field="*{imageUrl}">
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}"></textarea>
            </div>

            <div class="actions">
                <button type="submit">Save Product</button>
                <a class="btn btn-secondary" th:href="@{/products}">Back to Products</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
