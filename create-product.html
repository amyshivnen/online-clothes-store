<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Product</title>
</head>
<body>

<h1>Add New Product</h1>

<form th:action="@{/products/save}" th:object="${product}" method="post">
    <div>
        <label>Title:</label>
        <input type="text" th:field="*{title}">
        <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
    </div>

    <div>
        <label>Manufacturer:</label>
        <input type="text" th:field="*{manufacturer}">
        <span th:if="${#fields.hasErrors('manufacturer')}" th:errors="*{manufacturer}"></span>
    </div>

    <div>
        <label>Category:</label>
        <input type="text" th:field="*{category}">
        <span th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
    </div>

    <div>
        <label>Price:</label>
        <input type="number" step="0.01" th:field="*{price}">
        <span th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
    </div>

    <div>
        <label>Stock Quantity:</label>
        <input type="number" th:field="*{stockQuantity}">
        <span th:if="${#fields.hasErrors('stockQuantity')}" th:errors="*{stockQuantity}"></span>
    </div>

    <div>
        <label>Image URL:</label>
        <input type="text" th:field="*{imageUrl}">
    </div>

    <div>
        <label>Description:</label>
        <textarea th:field="*{description}"></textarea>
    </div>

    <div>
        <button type="submit">Save Product</button>
    </div>
</form>

<p><a th:href="@{/products}">Back to Products</a></p>

</body>
</html>
