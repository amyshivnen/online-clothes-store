<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Product</title>
</head>
<body>

<h1>Edit Product</h1>

<form th:action="@{/products/update/{id}(id=${product.id})}" th:object="${product}" method="post">

    <p>
        <label for="title">Title:</label>
        <input type="text" id="title" th:field="*{title}" />
    </p>

    <p>
        <label for="manufacturer">Manufacturer:</label>
        <input type="text" id="manufacturer" th:field="*{manufacturer}" />
    </p>

    <p>
        <label for="category">Category:</label>
        <input type="text" id="category" th:field="*{category}" />
    </p>

    <p>
        <label for="price">Price:</label>
        <input type="number" step="0.01" id="price" th:field="*{price}" />
    </p>

    <p>
        <label for="stockQuantity">Stock Quantity:</label>
        <input type="number" id="stockQuantity" th:field="*{stockQuantity}" />
    </p>

    <p>
        <label for="imageUrl">Image URL:</label>
        <input type="text" id="imageUrl" th:field="*{imageUrl}" />
    </p>

    <p>
        <label for="description">Description:</label>
        <textarea id="description" th:field="*{description}"></textarea>
    </p>

    <p>
        <button type="submit">Update Product</button>
    </p>

</form>

<p><a th:href="@{/products}">Back to Products</a></p>

</body>
</html>
