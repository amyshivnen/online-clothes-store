<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <section class="page-header">
        <h1>Order Details</h1>
        <p>Your order summary at a glance.</p>
    </section>

    <div class="card details-list">
        <p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
        <p><strong>Date:</strong> <span th:text="${order.orderDate}"></span></p>
        <p><strong>Customer:</strong> <span th:text="${order.user != null ? order.user.firstName + ' ' + order.user.lastName : 'N/A'}"></span></p>
        <p><strong>Total:</strong> €<span th:text="${order.totalPrice}"></span></p>
        <p><strong>Status:</strong> <span class="badge" th:text="${order.status}"></span></p>
    </div>

    <div class="table-card">
        <h2 style="margin-bottom: 16px; color: var(--primary-dark);">Items</h2>
        <table>
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price</th>
            </tr>

            <tr th:each="item : ${order.items}">
                <td th:text="${item.product.title}"></td>
                <td th:text="${item.quantity}"></td>
                <td>€<span th:text="${item.price}"></span></td>
            </tr>
        </table>
    </div>

    <a class="footer-link" th:href="@{/orders}">← Back to Orders</a>
</div>

</body>
</html>
