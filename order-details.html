<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>
</head>
<body>

<h1>Order Details</h1>

<p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
<p><strong>Date:</strong> <span th:text="${order.orderDate}"></span></p>
<p><strong>Customer:</strong>
    <span th:text="${order.user != null ? order.user.firstName + ' ' + order.user.lastName : 'N/A'}"></span>
</p>
<p><strong>Total:</strong> <span th:text="${order.totalPrice}"></span></p>
<p><strong>Status:</strong> <span th:text="${order.status}"></span></p>

<h2>Items</h2>

<table border="1">
    <tr>
        <th>Product</th>
        <th>Quantity</th>
        <th>Price</th>
    </tr>

    <tr th:each="item : ${order.items}">
        <td th:text="${item.product.title}"></td>
        <td th:text="${item.quantity}"></td>
        <td th:text="${item.price}"></td>
    </tr>
</table>

<p><a th:href="@{/orders}">Back to Orders</a></p>

</body>
</html>
