<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Orders</title>
</head>
<body>

<h1 th:text="${pageTitle}">Orders</h1>

<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}"></p>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Date</th>
        <th>Customer</th>
        <th>Total</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    <tr th:each="order : ${orders}">
        <td th:text="${order.id}"></td>
        <td th:text="${order.orderDate}"></td>
        <td th:text="${order.user != null ? order.user.firstName + ' ' + order.user.lastName : 'N/A'}"></td>
        <td th:text="${order.totalPrice}"></td>
        <td th:text="${order.status}"></td>
        <td>
            <a th:href="@{/orders/{id}(id=${order.id})}">View</a>
        </td>
    </tr>
</table>

<p><a th:href="@{/products}">Back to Products</a></p>

</body>
</html>
