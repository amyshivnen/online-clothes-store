<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Product Details</title>
</head>
<body>

<h1>Product Details</h1>

<p th:if="${successMessage}" th:text="${successMessage}"></p>
<p th:if="${errorMessage}" th:text="${errorMessage}"></p>

<p><strong>Title:</strong> <span th:text="${product.title}"></span></p>
<p><strong>Manufacturer:</strong> <span th:text="${product.manufacturer}"></span></p>
<p><strong>Category:</strong> <span th:text="${product.category}"></span></p>
<p><strong>Price:</strong> <span th:text="${product.price}"></span></p>
<p><strong>Stock:</strong> <span th:text="${product.stockQuantity}"></span></p>
<p><strong>Description:</strong> <span th:text="${product.description}"></span></p>

<p th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}">
    <img th:src="${product.imageUrl}" alt="Product Image" width="150">
</p>

<p sec:authorize="isAuthenticated()">
    <a th:href="@{/cart/add/{id}(id=${product.id})}">Add to Cart</a>
</p>
<p sec:authorize="!isAuthenticated()">
    <a th:href="@{/login}">Login to add to cart</a>
</p>

<hr>

<div sec:authorize="isAuthenticated()">
    <h2>Leave a Review</h2>

    <form th:action="@{/reviews/save/{productId}(productId=${product.id})}" th:object="${review}" method="post">
        <div>
            <label>Rating (1-5):</label>
            <input type="number" min="1" max="5" th:field="*{rating}">
            <span th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></span>
        </div>

        <div>
            <label>Comment:</label>
            <textarea th:field="*{comment}"></textarea>
        </div>

        <div>
            <button type="submit">Submit Review</button>
        </div>
    </form>

    <hr>
</div>

<h2>Reviews</h2>

<div th:if="${#lists.isEmpty(reviews)}">
    <p>No reviews yet.</p>
</div>

<div th:each="review : ${reviews}">
    <p><strong>Rating:</strong> <span th:text="${review.rating}"></span>/5</p>
    <p><strong>Comment:</strong> <span th:text="${review.comment}"></span></p>
    <p><strong>User:</strong> <span th:text="${review.user != null ? review.user.firstName : 'Unknown'}"></span></p>
    <hr>
</div>

<p><a th:href="@{/products}">Back to Products</a></p>

</body>
</html>
