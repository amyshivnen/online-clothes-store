<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Product Details</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar">
    <div class="brand">Pink Boutique</div>
    <div class="nav-links">
        <a class="btn btn-secondary" th:href="@{/products}">Back to Products</a>
        <a class="btn btn-secondary" th:href="@{/cart}" sec:authorize="isAuthenticated()">Cart</a>
    </div>
</nav>

<div class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="grid grid-2">
        <div class="card">
            <img class="rounded" style="width:100%; max-height:420px; object-fit:cover;"
                 th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                 th:src="${product.imageUrl}" alt="Product Image">
        </div>

        <div class="card details-list">
            <h1 style="color: var(--primary-dark); margin-bottom: 12px;" th:text="${product.title}"></h1>
            <p><strong>Manufacturer:</strong> <span th:text="${product.manufacturer}"></span></p>
            <p><strong>Category:</strong> <span th:text="${product.category}"></span></p>
            <p><strong>Price:</strong> €<span th:text="${product.price}"></span></p>
            <p><strong>Stock:</strong> <span th:text="${product.stockQuantity}"></span></p>
            <p><strong>Description:</strong> <span th:text="${product.description}"></span></p>

            <div class="actions">
                <a class="btn btn-primary" sec:authorize="isAuthenticated()" th:href="@{/cart/add/{id}(id=${product.id})}">Add to Cart</a>
                <a class="btn btn-secondary" sec:authorize="!isAuthenticated()" th:href="@{/login}">Login to Add to Cart</a>
            </div>
        </div>
    </div>

    <div class="form-card" sec:authorize="isAuthenticated()">
        <h2 style="margin-bottom: 16px; color: var(--primary-dark);">Leave a Review</h2>

        <form th:action="@{/reviews/save/{productId}(productId=${product.id})}" th:object="${review}" method="post">
            <div class="form-group">
                <label>Rating (1-5)</label>
                <input type="number" min="1" max="5" th:field="*{rating}">
                <span class="error-text" th:if="${#fields.hasErrors('rating')}" th:errors="*{rating}"></span>
            </div>

            <div class="form-group">
                <label>Comment</label>
                <textarea th:field="*{comment}"></textarea>
            </div>

            <button type="submit">Submit Review</button>
        </form>
    </div>

    <div class="card">
        <h2 style="margin-bottom: 16px; color: var(--primary-dark);">Reviews</h2>

        <div th:if="${#lists.isEmpty(reviews)}" class="empty-state">
            <p>No reviews yet.</p>
        </div>

        <div th:each="review : ${reviews}" class="review-card">
            <p><strong>Rating:</strong> <span th:text="${review.rating}"></span>/5</p>
            <p><strong>Comment:</strong> <span th:text="${review.comment}"></span></p>
            <p><strong>User:</strong> <span th:text="${review.user != null ? review.user.firstName : 'Unknown'}"></span></p>
        </div>
    </div>
</div>

</body>
</html>
