<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <div class="form-card centered-card" style="max-width: 700px;">
        <h1 style="text-align:center; color: var(--primary-dark); margin-bottom: 20px;">Create Your Account ✨</h1>

        <form th:action="@{/users/save}" th:object="${user}" method="post">
            <div class="grid grid-2">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" th:field="*{firstName}">
                    <span class="error-text" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" th:field="*{lastName}">
                    <span class="error-text" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
                </div>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}">
                <span class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}">
                <span class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="form-group">
                <label>Shipping Address</label>
                <input type="text" th:field="*{shippingAddress}">
                <span class="error-text" th:if="${#fields.hasErrors('shippingAddress')}" th:errors="*{shippingAddress}"></span>
            </div>

            <div class="form-group">
                <label>Payment Method</label>
                <input type="text" th:field="*{paymentMethod}" placeholder="e.g. Visa ending 1234">
                <span class="error-text" th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}"></span>
            </div>

            <input type="hidden" th:field="*{role}">

            <button type="submit" style="width:100%;">Register</button>
        </form>

        <a class="footer-link" th:href="@{/}">← Back to Home</a>
    </div>
</div>

</body>
</html>
