<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
</head>
<body>

<h1>Customer Registration</h1>

<form th:action="@{/users/save}" th:object="${user}" method="post">
    <div>
        <label>First Name:</label>
        <input type="text" th:field="*{firstName}">
        <span th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></span>
    </div>

    <div>
        <label>Last Name:</label>
        <input type="text" th:field="*{lastName}">
        <span th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></span>
    </div>

    <div>
        <label>Email:</label>
        <input type="email" th:field="*{email}">
        <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
    </div>

    <div>
        <label>Password:</label>
        <input type="password" th:field="*{password}">
        <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
    </div>

    <div>
        <label>Shipping Address:</label>
        <input type="text" th:field="*{shippingAddress}">
        <span th:if="${#fields.hasErrors('shippingAddress')}" th:errors="*{shippingAddress}"></span>
    </div>

    <div>
        <label>Payment Method:</label>
        <input type="text" th:field="*{paymentMethod}" placeholder="e.g. Visa ending 1234">
        <span th:if="${#fields.hasErrors('paymentMethod')}" th:errors="*{paymentMethod}"></span>
    </div>

    <input type="hidden" th:field="*{role}">

    <div>
        <button type="submit">Register</button>
    </div>
</form>

<p><a th:href="@{/}">Home</a></p>

</body>
</html>
