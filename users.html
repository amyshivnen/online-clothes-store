<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Users</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <section class="page-header">
        <h1>Registered Users</h1>
        <p>Customer overview for your boutique.</p>
    </section>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Shipping Address</th>
                <th>Payment Method</th>
                <th>Purchase History</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.firstName}"></td>
                <td th:text="${user.lastName}"></td>
                <td th:text="${user.email}"></td>
                <td><span class="badge" th:text="${user.role}"></span></td>
                <td th:text="${user.shippingAddress}"></td>
                <td th:text="${user.paymentMethod}"></td>
                <td><a class="btn btn-primary" th:href="@{/users/{id}(id=${user.id})}">View History</a></td>
            </tr>
            </tbody>
        </table>
    </div>

    <a class="footer-link" th:href="@{/admin}">← Back to Admin</a>
</div>

</body>
</html>
